<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1e"/>
      <stop offset="100%" style="stop-color:#0e1a40"/>
    </linearGradient>
    <linearGradient id="canvas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0520"/>
      <stop offset="60%" style="stop-color:#1e0a4a"/>
      <stop offset="100%" style="stop-color:#3b0764"/>
    </linearGradient>
    <radialGradient id="portraitGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="skinGen" cx="42%" cy="32%" r="62%">
      <stop offset="0%" style="stop-color:#f5d0a8"/>
      <stop offset="55%" style="stop-color:#e0a878"/>
      <stop offset="100%" style="stop-color:#c88858"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Sparkle reveal mask: top clear, bottom fading -->
    <linearGradient id="revealMask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#000;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="280" rx="16" fill="url(#bg)"/>

  <!-- Prompt input box -->
  <rect x="20" y="16" width="360" height="32" rx="8" fill="#1a0a3a" stroke="#4c1d95" stroke-width="1"/>
  <text x="36" y="36" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">"</text>
  <text x="44" y="36" font-family="system-ui,sans-serif" font-size="11" fill="#c084fc">20대 여성, 카페, 자연스러운 미소</text>
  <text x="352" y="36" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af">"</text>
  <!-- Cursor blink -->
  <rect x="344" y="24" width="2" height="14" rx="1" fill="#a855f7" opacity="0.8"/>

  <!-- Generation canvas -->
  <rect x="20" y="58" width="360" height="172" rx="12" fill="url(#canvas)" stroke="#4c1d95" stroke-width="1"/>
  <rect x="20" y="58" width="360" height="172" rx="12" fill="url(#portraitGlow)"/>

  <!-- Generated portrait appearing -->
  <!-- Shoulders (bottom half, fading in) -->
  <path d="M60,230 C90,195 130,184 200,184 C270,184 310,195 340,230 Z" fill="#3730a3" opacity="0.75"/>
  <!-- Neck -->
  <rect x="190" y="175" width="20" height="20" rx="4" fill="#e0a878" opacity="0.85"/>
  <!-- Hair -->
  <ellipse cx="200" cy="125" rx="52" ry="62" fill="#180d05" opacity="0.9"/>
  <ellipse cx="152" cy="135" rx="16" ry="50" fill="#140c04" opacity="0.85"/>
  <ellipse cx="248" cy="135" rx="16" ry="50" fill="#140c04" opacity="0.85"/>
  <!-- Face -->
  <ellipse cx="200" cy="130" rx="42" ry="50" fill="url(#skinGen)" opacity="0.9"/>
  <!-- Cheeks -->
  <ellipse cx="172" cy="140" rx="10" ry="6" fill="#e87060" opacity="0.10"/>
  <ellipse cx="228" cy="140" rx="10" ry="6" fill="#e87060" opacity="0.10"/>
  <!-- Eyebrows -->
  <path d="M175,116 Q183,112 190,114" fill="none" stroke="#2a1808" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M210,114 Q217,112 225,116" fill="none" stroke="#2a1808" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- Left eye -->
  <ellipse cx="182" cy="123" rx="9" ry="7" fill="white" opacity="0.95"/>
  <circle cx="182" cy="123" r="5.5" fill="#4a2c14"/>
  <circle cx="182" cy="123" r="3" fill="#0e0805"/>
  <circle cx="184" cy="121" r="1.5" fill="white" opacity="0.9"/>
  <!-- Right eye -->
  <ellipse cx="218" cy="123" rx="9" ry="7" fill="white" opacity="0.95"/>
  <circle cx="218" cy="123" r="5.5" fill="#4a2c14"/>
  <circle cx="218" cy="123" r="3" fill="#0e0805"/>
  <circle cx="220" cy="121" r="1.5" fill="white" opacity="0.9"/>
  <!-- Nose -->
  <path d="M195,134 Q200,141 205,134" fill="none" stroke="#c8906a" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Smile -->
  <path d="M184,150 Q200,162 216,150 Q200,168 184,150 Z" fill="#c86050" opacity="0.85"/>
  <path d="M186,150 Q200,145 214,150" fill="none" stroke="#e87868" stroke-width="1" opacity="0.5"/>

  <!-- Generation sparkles around portrait -->
  <g filter="url(#softGlow)">
    <text x="42" y="98" font-family="system-ui,sans-serif" font-size="14" fill="#fbbf24" opacity="0.9">✦</text>
    <text x="344" y="108" font-family="system-ui,sans-serif" font-size="11" fill="#f0abfc" opacity="0.8">✦</text>
    <text x="36" y="175" font-family="system-ui,sans-serif" font-size="9" fill="#a78bfa" opacity="0.7">✦</text>
    <text x="350" y="185" font-family="system-ui,sans-serif" font-size="12" fill="#fbbf24" opacity="0.8">✦</text>
    <text x="150" y="68" font-family="system-ui,sans-serif" font-size="9" fill="#c084fc" opacity="0.7">✦</text>
    <text x="248" y="66" font-family="system-ui,sans-serif" font-size="10" fill="#818cf8" opacity="0.75">✦</text>
  </g>

  <!-- "Generating done" indicator -->
  <rect x="120" y="196" width="160" height="22" rx="11" fill="#1a0533" stroke="#4c1d95" stroke-width="1"/>
  <circle cx="137" cy="207" r="4" fill="#34d399"/>
  <text x="200" y="211" font-family="system-ui,sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">✦ 인물 생성 완료</text>

  <!-- Bottom title -->
  <text x="200" y="250" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">AI 인물 이미지 생성</text>
  <text x="200" y="270" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">텍스트 프롬프트 한 줄로 원하는 인물 즉시 생성</text>
</svg>
