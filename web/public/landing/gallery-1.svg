<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#2d1a40"/>
      <stop offset="100%" style="stop-color:#0a0515"/>
    </radialGradient>
    <radialGradient id="skinSelfie" cx="42%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#f8d8b0"/>
      <stop offset="55%" style="stop-color:#e8b888"/>
      <stop offset="100%" style="stop-color:#d09060"/>
    </radialGradient>
    <radialGradient id="bgBlur" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.20"/>
      <stop offset="100%" style="stop-color:#0a0010;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background (bokeh-style indoor) -->
  <rect width="400" height="300" fill="url(#bg1)"/>
  <rect width="400" height="300" fill="url(#bgBlur)"/>

  <!-- Bokeh circles -->
  <circle cx="40" cy="50" r="22" fill="#7c3aed" opacity="0.08"/>
  <circle cx="340" cy="80" r="18" fill="#a855f7" opacity="0.07"/>
  <circle cx="60" cy="220" r="15" fill="#6d28d9" opacity="0.06"/>
  <circle cx="350" cy="240" r="20" fill="#7c3aed" opacity="0.07"/>
  <circle cx="200" cy="30" r="12" fill="#c084fc" opacity="0.05"/>

  <!-- Selfie close-up portrait -->
  <!-- Shoulders (below face, close crop = shoulders near bottom) -->
  <path d="M60,300 C100,250 150,234 200,234 C250,234 300,250 340,300 Z" fill="#4f46e5"/>

  <!-- Hair (long, framing face) -->
  <!-- Main hair mass -->
  <ellipse cx="200" cy="118" rx="100" ry="125" fill="#1a0f08"/>
  <!-- Hair sides extending down -->
  <ellipse cx="96" cy="160" rx="28" ry="95" fill="#140c06"/>
  <ellipse cx="304" cy="160" rx="28" ry="95" fill="#140c06"/>

  <!-- Neck -->
  <rect x="184" y="222" width="32" height="28" rx="8" fill="#e8b888"/>

  <!-- Face (close-up, fills more of frame) -->
  <ellipse cx="200" cy="135" rx="82" ry="96" fill="url(#skinSelfie)"/>

  <!-- Soft cheek blush -->
  <ellipse cx="148" cy="155" rx="20" ry="12" fill="#e87878" opacity="0.12"/>
  <ellipse cx="252" cy="155" rx="20" ry="12" fill="#e87878" opacity="0.12"/>

  <!-- Eyebrows -->
  <path d="M154,108 Q168,103 180,107" fill="none" stroke="#2a1808" stroke-width="3" stroke-linecap="round"/>
  <path d="M220,107 Q232,103 246,108" fill="none" stroke="#2a1808" stroke-width="3" stroke-linecap="round"/>

  <!-- Left eye -->
  <ellipse cx="167" cy="120" rx="17" ry="13" fill="white"/>
  <circle cx="167" cy="120" r="10" fill="#4a2c14"/>
  <circle cx="167" cy="120" r="6" fill="#0e0805"/>
  <circle cx="171" cy="117" r="3" fill="white" opacity="0.9"/>
  <!-- Eyelash subtle -->
  <path d="M150,117 Q152,113 155,118" fill="none" stroke="#1a0f06" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M179,116 Q181,112 183,117" fill="none" stroke="#1a0f06" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right eye -->
  <ellipse cx="233" cy="120" rx="17" ry="13" fill="white"/>
  <circle cx="233" cy="120" r="10" fill="#4a2c14"/>
  <circle cx="233" cy="120" r="6" fill="#0e0805"/>
  <circle cx="237" cy="117" r="3" fill="white" opacity="0.9"/>
  <path d="M217,117 Q219,113 222,118" fill="none" stroke="#1a0f06" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M244,116 Q246,112 248,117" fill="none" stroke="#1a0f06" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M192,140 L190,160 Q200,166 210,160 L208,140" fill="none" stroke="#d09060" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Lips -->
  <path d="M172,182 Q200,194 228,182 Q200,208 172,182 Z" fill="#c86050"/>
  <path d="M174,182 Q200,175 226,182" fill="none" stroke="#e87868" stroke-width="1.5" opacity="0.6"/>

  <!-- Phone arm (holding phone - selfie pose) -->
  <rect x="290" y="160" width="18" height="70" rx="6" fill="#d09060" opacity="0.6"/>
  <rect x="306" y="170" width="50" height="38" rx="8" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- Camera lens on phone -->
  <circle cx="312" cy="180" r="4" fill="#0a0a20" stroke="#818cf8" stroke-width="1"/>
  <circle cx="312" cy="180" r="2" fill="#1e293b"/>
  <!-- Phone screen selfie preview -->
  <rect x="316" y="173" width="36" height="30" rx="3" fill="#0e0830"/>
  <ellipse cx="334" cy="183" rx="8" ry="10" fill="#1a0f08" opacity="0.8"/>
  <ellipse cx="334" cy="185" rx="6" ry="7" fill="#c88858" opacity="0.6"/>

  <!-- AI Enhanced badge -->
  <rect x="10" y="272" width="100" height="20" rx="4" fill="#1a0533" opacity="0.92"/>
  <rect x="10" y="272" width="100" height="20" rx="4" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="60" y="285" font-family="system-ui,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">✦ AI 보정됨</text>

  <!-- Selfie label -->
  <rect x="286" y="272" width="104" height="20" rx="4" fill="#1a0533" opacity="0.92"/>
  <rect x="286" y="272" width="104" height="20" rx="4" stroke="#4c1d95" stroke-width="0.5"/>
  <text x="338" y="285" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">셀피 · 인물 보정</text>
</svg>
